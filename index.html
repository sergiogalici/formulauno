<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ripartizione Trasporto — Ibrido A1+A2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/decimal.js/10.4.3/decimal.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg-secondary: #f5f4f0;
    --bg-tertiary: #eeede8;
    --text-primary: #1a1a18;
    --text-secondary: #6b6a65;
    --text-tertiary: #9b9a95;
    --border: rgba(0,0,0,0.12);
    --border-strong: rgba(0,0,0,0.22);
    --accent-val: #185fa5;
    --accent-qty: #ba7517;
    --accent-hyb: #3b6d11;
    --danger: #a32d2d;
    --radius-md: 8px;
    --radius-lg: 12px;
    --font-mono: 'Courier New', monospace;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg-secondary: #252522;
      --bg-tertiary: #2e2e2b;
      --text-primary: #f0efe8;
      --text-secondary: #9b9a92;
      --text-tertiary: #6b6a62;
      --border: rgba(255,255,255,0.10);
      --border-strong: rgba(255,255,255,0.20);
      --accent-val: #85b7eb;
      --accent-qty: #ef9f27;
      --accent-hyb: #97c459;
      --danger: #f09595;
    }
  }

  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container { max-width: 720px; margin: 0 auto; }

  header {
    margin-bottom: 2rem;
    border-bottom: 0.5px solid var(--border);
    padding-bottom: 1.25rem;
  }
  header h1 { font-size: 22px; font-weight: 400; letter-spacing: -0.3px; }
  header p { font-size: 13px; color: var(--text-tertiary); margin-top: 4px; font-family: var(--font-mono); }

  .card {
    background: var(--bg-secondary);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    margin-bottom: 10px;
  }

  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  label { font-size: 12px; color: var(--text-secondary); font-family: var(--font-mono); }

  input[type="number"], input[type="text"] {
    background: var(--bg);
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius-md);
    color: var(--text-primary);
    font-size: 14px;
    padding: 6px 10px;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus { border-color: var(--accent-val); }
  input[type="text"] { width: 90px; font-weight: 500; }
  input.qty { width: 70px; }
  input.price { width: 85px; }
  input.pt-input { width: 110px; }

  input[type="range"] {
    width: 100%;
    accent-color: var(--accent-val);
  }

  button {
    background: transparent;
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius-md);
    color: var(--text-primary);
    font-size: 13px;
    padding: 6px 14px;
    cursor: pointer;
    transition: background 0.12s;
    font-family: Georgia, serif;
  }
  button:hover { background: var(--bg-secondary); }
  button.remove {
    color: var(--danger);
    border-color: var(--danger);
    padding: 4px 10px;
    font-size: 12px;
    margin-left: auto;
  }

  .slider-box {
    background: var(--bg-secondary);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    margin-bottom: 1.5rem;
  }
  .slider-labels {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .slider-labels span { font-size: 13px; color: var(--text-secondary); font-family: var(--font-mono); }
  .slider-labels #lbl-mix { font-size: 13px; font-weight: 500; font-family: var(--font-mono); color: var(--text-primary); }
  .slider-ends {
    display: flex; justify-content: space-between; margin-top: 6px;
  }
  .slider-ends span { font-size: 11px; color: var(--text-tertiary); font-family: var(--font-mono); }

  .metrics {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
    margin-bottom: 1.25rem;
  }
  .metric {
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    padding: 1rem;
    text-align: center;
  }
  .metric-label { font-size: 11px; color: var(--text-secondary); font-family: var(--font-mono); margin-bottom: 4px; }
  .metric-value { font-size: 20px; font-weight: 400; }
  .metric-value small { font-size: 13px; color: var(--text-secondary); }

  .table-wrap {
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 1rem;
    overflow-x: auto;
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; min-width: 560px; }
  th {
    background: var(--bg-secondary);
    padding: 10px 12px;
    font-size: 11px;
    font-weight: 500;
    font-family: var(--font-mono);
    white-space: nowrap;
  }
  th:first-child, td:first-child { text-align: left; }
  th:not(:first-child), td:not(:first-child) { text-align: right; }
  td { padding: 10px 12px; }
  tr + tr td { border-top: 0.5px solid var(--border); }
  tr.total-row td {
    border-top: 0.5px solid var(--border-strong);
    background: var(--bg-secondary);
    font-weight: 500;
  }

  .formula-box {
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    padding: 10px 12px;
    font-size: 12px;
    font-family: var(--font-mono);
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    margin-bottom: 1rem;
  }

  .precision-note {
    font-size: 12px;
    color: var(--text-tertiary);
    border-top: 0.5px solid var(--border);
    padding-top: 10px;
    font-family: var(--font-mono);
  }

  .add-wrap { display: flex; gap: 8px; margin: 10px 0 1.5rem; }

  .col-val { color: var(--accent-val); }
  .col-qty { color: var(--accent-qty); }
  .col-hyb { color: var(--accent-hyb); font-weight: 500; }

  @media (max-width: 500px) {
    .metrics { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>Ripartizione trasporto — ibrido</h1>
    <p>approccio 1 (valore) + approccio 2 (quantità) &nbsp;·&nbsp; Decimal.js precision</p>
  </header>

  <div class="card">
    <div class="row">
      <label>Prezzo trasporto (PT)</label>
      <input type="number" id="pt" class="pt-input" value="20" min="0" step="0.01" oninput="compute()" />
      <span style="font-size:13px;color:var(--text-tertiary)">CAD</span>
    </div>
  </div>

  <div id="products-container"></div>

  <div class="add-wrap">
    <button onclick="addProduct()">+ aggiungi prodotto</button>
  </div>

  <div class="slider-box">
    <div class="slider-labels">
      <span>peso quantità</span>
      <span id="lbl-mix">50% / 50%</span>
      <span>peso valore</span>
    </div>
    <input type="range" id="mix" min="0" max="100" value="50" step="1" oninput="updateMixLabel();compute()" />
    <div class="slider-ends">
      <span>solo qtà</span>
      <span>solo valore</span>
    </div>
  </div>

  <div id="results"></div>
  <div id="precision-note" class="precision-note"></div>

</div>

<script>
Decimal.set({ precision: 28, rounding: 4 });
const D = Decimal;

let products = [
  { id: 1, name: 'Tipo A', qty: 3, price: 1.00 },
  { id: 2, name: 'Tipo B', qty: 2, price: 2.30 }
];
let nextId = 3;

function addProduct() {
  products.push({ id: nextId++, name: 'Tipo ' + String.fromCharCode(64 + products.length + 1), qty: 1, price: 1.00 });
  render();
}
function removeProduct(id) {
  if (products.length <= 1) return;
  products = products.filter(p => p.id !== id);
  render();
}
function syncProducts() {
  products.forEach(p => {
    const n = document.getElementById(p.id + '-name');
    const q = document.getElementById(p.id + '-qty');
    const pr = document.getElementById(p.id + '-price');
    if (n) p.name = n.value;
    if (q) p.qty = parseFloat(q.value) || 0;
    if (pr) p.price = parseFloat(pr.value) || 0;
  });
}
function updateMixLabel() {
  const v = parseInt(document.getElementById('mix').value);
  document.getElementById('lbl-mix').textContent = (100 - v) + '% / ' + v + '%';
}
function renderProducts() {
  const c = document.getElementById('products-container');
  c.innerHTML = products.map(p => `
    <div class="card">
      <div class="row">
        <input type="text" id="${p.id}-name" value="${p.name}" oninput="compute()" />
        <label>Qtà</label>
        <input type="number" id="${p.id}-qty" class="qty" value="${p.qty}" min="0" step="1" oninput="compute()" />
        <label>Prezzo/u</label>
        <input type="number" id="${p.id}-price" class="price" value="${p.price}" min="0" step="0.01" oninput="compute()" />
        <span style="font-size:12px;color:var(--text-tertiary)">CAD</span>
        ${products.length > 1 ? `<button class="remove" onclick="removeProduct(${p.id})">✕</button>` : ''}
      </div>
    </div>
  `).join('');
}

function compute() {
  syncProducts();
  const PT = new D(parseFloat(document.getElementById('pt').value) || 0);
  const vPct = parseInt(document.getElementById('mix').value);
  const wVal = new D(vPct).div(100);
  const wQty = new D(1).minus(wVal);

  const rows = products.map(p => ({
    name: p.name,
    PA: new D(p.price),
    QA: new D(p.qty),
    T: new D(p.price).times(new D(p.qty))
  }));

  const T_TOT = rows.reduce((a, r) => a.plus(r.T), new D(0));
  const Q_TOT = rows.reduce((a, r) => a.plus(r.QA), new D(0));

  const resultsDiv = document.getElementById('results');
  if (T_TOT.isZero() || Q_TOT.isZero()) {
    resultsDiv.innerHTML = '<p style="color:var(--text-secondary);font-size:13px;margin:1rem 0;">Inserisci quantità e prezzi per calcolare.</p>';
    document.getElementById('precision-note').innerHTML = '';
    return;
  }

  let totA1 = new D(0), totA2 = new D(0), totHyb = new D(0);

  const computed = rows.map(r => {
    const quotaA1 = PT.times(r.T).div(T_TOT);
    const quotaA2 = PT.times(r.QA).div(Q_TOT);
    const quotaHyb = quotaA1.times(wVal).plus(quotaA2.times(wQty));
    const delta = quotaA1.minus(quotaA2);
    totA1 = totA1.plus(quotaA1);
    totA2 = totA2.plus(quotaA2);
    totHyb = totHyb.plus(quotaHyb);
    return { ...r, quotaA1, quotaA2, quotaHyb, delta };
  });

  const scartoHyb = totHyb.minus(PT);
  const scartoOk = scartoHyb.abs().lessThan('0.0001');
  const scartoStyle = scartoOk ? 'color:var(--accent-hyb)' : 'color:var(--danger)';
  const qPct = 100 - vPct;

  resultsDiv.innerHTML = `
    <div class="metrics">
      <div class="metric">
        <div class="metric-label">valore merce</div>
        <div class="metric-value">${T_TOT.toFixed(2)} <small>CAD</small></div>
      </div>
      <div class="metric">
        <div class="metric-label">quantità totale</div>
        <div class="metric-value">${Q_TOT.toFixed(0)} <small>pz</small></div>
      </div>
      <div class="metric">
        <div class="metric-label">trasporto (PT)</div>
        <div class="metric-value">${PT.toFixed(2)} <small>CAD</small></div>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:13%;text-align:left;">Prodotto</th>
            <th style="width:14%;">Totale</th>
            <th style="width:16%;color:var(--accent-val);">A1 (valore)</th>
            <th style="width:16%;color:var(--accent-qty);">A2 (qtà)</th>
            <th style="width:20%;color:var(--accent-hyb);">Ibrido ${qPct}/${vPct}</th>
            <th style="width:18%;">Δ (A1 − A2)</th>
          </tr>
        </thead>
        <tbody>
          ${computed.map(r => {
            const dSign = r.delta.isPositive() ? '+' : '';
            const dColor = r.delta.abs().lessThan('0.001')
              ? 'var(--text-tertiary)'
              : r.delta.isPositive() ? 'var(--accent-val)' : 'var(--accent-qty)';
            return `<tr>
              <td style="font-weight:500;">${r.name}</td>
              <td style="color:var(--text-secondary);font-family:var(--font-mono);">${r.T.toFixed(2)}</td>
              <td class="col-val" style="font-family:var(--font-mono);">${r.quotaA1.toFixed(4)}</td>
              <td class="col-qty" style="font-family:var(--font-mono);">${r.quotaA2.toFixed(4)}</td>
              <td class="col-hyb" style="font-family:var(--font-mono);">${r.quotaHyb.toFixed(4)}</td>
              <td style="color:${dColor};font-family:var(--font-mono);">${dSign}${r.delta.toFixed(4)}</td>
            </tr>`;
          }).join('')}
          <tr class="total-row">
            <td colspan="2">Totale</td>
            <td class="col-val" style="font-family:var(--font-mono);">${totA1.toFixed(4)}</td>
            <td class="col-qty" style="font-family:var(--font-mono);">${totA2.toFixed(4)}</td>
            <td style="font-family:var(--font-mono);${scartoStyle}">${totHyb.toFixed(4)}</td>
            <td style="color:var(--text-tertiary);font-family:var(--font-mono);">—</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="formula-box">
      <span style="color:var(--text-secondary)">Formula:</span>
      <span>quota_X = PT × [
        <span class="col-qty">${(qPct/100).toFixed(2)} × (QA/Q_TOT)</span>
        +
        <span class="col-val">${(vPct/100).toFixed(2)} × (TA/T_TOT)</span>
      ]</span>
      <span style="color:var(--text-secondary)">scarto:</span>
      <span style="${scartoStyle};font-family:var(--font-mono);">${scartoHyb.toFixed(10)}</span>
    </div>
  `;

  document.getElementById('precision-note').innerHTML =
    `Decimal.js precision 28 &nbsp;·&nbsp; scarto totale ibrido = <span style="${scartoStyle}">${scartoHyb.toExponential(4)}</span>`;
}

function render() {
  renderProducts();
  updateMixLabel();
  compute();
}

render();
</script>
</body>
</html>
